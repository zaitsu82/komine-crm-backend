name: CI

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # TypeScriptコンパイルチェック
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Checkout and build shared types
        run: |
          git clone --depth 1 https://github.com/zaitsu82/komine-types.git ../packages/types
          cd ../packages/types && npm ci && npm run build

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: TypeScript compile check
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: dist/
          retention-days: 7

  # コード品質チェック（ESLint + Prettier）
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Checkout and build shared types
        run: |
          git clone --depth 1 https://github.com/zaitsu82/komine-types.git ../packages/types
          cd ../packages/types && npm ci && npm run build

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check code formatting
        run: npm run format:check

  # API仕様書の検証
  swagger:
    name: Swagger Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Checkout and build shared types
        run: |
          git clone --depth 1 https://github.com/zaitsu82/komine-types.git ../packages/types
          cd ../packages/types && npm ci && npm run build

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate Swagger specification
        run: npm run swagger:validate

      - name: Build Swagger JSON
        run: npm run swagger:build

  # セキュリティスキャン（npm audit）
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # 全 dep (dev 含む) は moderate+ で情報出力のみ。dev dep の脆弱性は
      # 本番影響が無いケースが多く、ノイズ抑制のため gate にしない。
      - name: Run npm audit (informational, dev included)
        run: npm audit --audit-level=moderate
        continue-on-error: true

      # prod dep の high+ 脆弱性は **本番影響あり** とみなして必ず CI を fail させる。
      # 本番ランタイムに乗る依存にのみ反応するので false positive が出にくい。
      - name: Run npm audit (production only, gate)
        run: npm audit --omit=dev --audit-level=high

  # Dockerイメージ脆弱性スキャン（Trivy）
  docker-security:
    name: Docker Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t cemetery-crm-backend:test .

      # SARIF 出力（CRITICAL + HIGH を GitHub Security ダッシュボードへ送る）。
      # この step は gate ではないので、失敗しても継続する。
      - name: Run Trivy vulnerability scanner (SARIF output)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: cemetery-crm-backend:test
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
        continue-on-error: true

      - name: Check if SARIF file exists
        id: sarif-check
        if: always()
        run: |
          if [ -f trivy-results.sarif ]; then
            echo "sarif_exists=true" >> $GITHUB_OUTPUT
          else
            echo "sarif_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always() && steps.sarif-check.outputs.sarif_exists == 'true'
        continue-on-error: true
        with:
          sarif_file: "trivy-results.sarif"

      # 情報出力: CRITICAL/HIGH/MEDIUM を log に出す（gate ではない）。
      - name: Run Trivy vulnerability scanner (table output, informational)
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: cemetery-crm-backend:test
          format: "table"
          severity: "CRITICAL,HIGH,MEDIUM"

      # **Gate**: 修正可能 (fix available) な **CRITICAL** 脆弱性があれば CI を fail させる。
      # `ignore-unfixed: true` で「修正パッチ未提供」のものはノイズ扱い。
      # SARIF upload より後ろに置いて、gate fail 時もダッシュボードには反映する。
      - name: Run Trivy vulnerability scanner (gate on fixable CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: cemetery-crm-backend:test
          format: "table"
          severity: "CRITICAL"
          exit-code: "1"
          ignore-unfixed: true

  # テスト実行（複数Node.jsバージョン）
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Checkout and build shared types
        run: |
          git clone --depth 1 https://github.com/zaitsu82/komine-types.git ../packages/types
          cd ../packages/types && npm ci && npm run build

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run tests
        run: npm test

      - name: Generate coverage report
        if: matrix.node-version == '20.x'
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        if: matrix.node-version == '20.x'
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Upload coverage reports
        if: matrix.node-version == '20.x'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  # すべてのチェックが成功したことを確認
  all-checks-passed:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [build, lint, swagger, security-audit, docker-security, test]
    if: always()

    steps:
      - name: Check if all jobs succeeded
        if: |
          needs.build.result != 'success' ||
          needs.lint.result != 'success' ||
          needs.swagger.result != 'success' ||
          needs.security-audit.result != 'success' ||
          needs.docker-security.result != 'success' ||
          needs.test.result != 'success'
        run: |
          echo "One or more checks failed"
          exit 1

      - name: All checks passed
        run: echo "All CI checks passed successfully!"
